<!DOCTYPE html>
<!-- §2.2.1 Authentication: Registration page — users register with name, email, password, role -->
<!-- §2.2.7 Error Handling: shows error for duplicate email or missing fields -->
<!-- §2.3 User Classes: role selection (Student / Faculty / Admin) at registration -->
<!-- RTM: FR-01 (D-ARCH-01, D-SEC-01) | NFR-02 (D-SEC-04) | NFR-03 (D-DB-04) -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — LeaveOk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" width="180">
                <circle cx="36" cy="40" r="30" fill="#4facfe" opacity="0.12"/>
                <path d="M18 40 L30 52 L54 28" stroke="#4facfe" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <text x="72" y="54" fill="#0f172a" font-family="Segoe UI,Arial,sans-serif" font-size="42" font-weight="700">Leave</text>
                <text x="198" y="54" fill="#4facfe" font-family="Segoe UI,Arial,sans-serif" font-size="42" font-weight="700">Ok</text>
            </svg>
        </div>
        <h2>Create account</h2>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your full name" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <label>Password</label>
            <input type="password" name="password" id="reg_pw" placeholder="Create a password" required>
            <div id="pw_hint" style="font-size:11px;color:#94a3b8;margin-top:4px;">
                Min 8 chars · at least one letter, number &amp; special character (!@#$%^&amp;*)
            </div>
            <div id="pw_strength" style="font-size:12px;margin-top:4px;"></div>

            <label>Role</label>
            <select name="role">
                <option value="Student">Student</option>
                <option value="Faculty">Faculty</option>
                <option value="Admin">Admin</option>
            </select>

            <button type="submit" class="btn-primary">Register</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>
<script>
    var pwInput = document.getElementById('reg_pw');
    var pwStrength = document.getElementById('pw_strength');
    if (pwInput) {
        pwInput.addEventListener('input', function () {
            var v = pwInput.value;
            var ok = v.length >= 8
                  && /[A-Za-z]/.test(v)
                  && /\d/.test(v)
                  && /[!@#$%^&*()\-_=+,.?":{}|<>\\\/]/.test(v);
            if (!v) { pwStrength.textContent = ''; return; }
            pwStrength.textContent = ok ? '✓ Strong password' : '✗ Weak — add letters, numbers & special chars';
            pwStrength.style.color = ok ? '#16a34a' : '#dc2626';
        });
    }
</script>
</body>
</html>
